<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>С 8 марта!</title>
  <style>
    :root{
      --bg1:#fff5f8;
      --bg2:#fce8f0;
      --bg3:#f8f0ff;
      --card: rgba(255,255,255,.82);
      --txt:#3d2a35;
      --muted:#7a6574;
      --a1:#e91e63;
      --a2:#ffb74d;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      color:var(--txt);
      background:
        radial-gradient(ellipse 90% 70% at 70% 20%, rgba(255,182,193,.5) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(255,218,235,.6) 0%, transparent 50%),
        radial-gradient(ellipse 70% 50% at 85% 70%, rgba(255,236,210,.5) 0%, transparent 45%),
        linear-gradient(165deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling: touch;
    }

    .glow{
      position: fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(180px 180px at 15% 25%, rgba(233,30,99,.12), transparent 45%),
        radial-gradient(160px 160px at 75% 20%, rgba(255,183,77,.15), transparent 45%),
        radial-gradient(140px 140px at 25% 75%, rgba(255,192,203,.2), transparent 45%),
        radial-gradient(150px 150px at 88% 80%, rgba(255,218,235,.18), transparent 45%);
      animation: drift 8s ease-in-out infinite alternate, glowPulse 5s ease-in-out infinite;
    }
    @keyframes drift{ from{ transform: translateY(-6px);} to{ transform: translateY(6px);} }
    @keyframes glowPulse{ 0%,100%{ opacity: .9;} 50%{ opacity: 1;} }

    canvas#hearts, canvas#sparkles, canvas#confetti{
      position:fixed; inset:0; pointer-events:none; z-index:1;
    }

    .card{
      width:min(920px, 92vw);
      background: var(--card);
      border: 1px solid rgba(233,30,99,.12);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 8px 32px rgba(180,100,120,.15), 0 2px 8px rgba(0,0,0,.06);
      position: relative;
      z-index: 2;
      overflow:hidden;
    }
    .card:before{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(400px 160px at 20% 0%, rgba(233,30,99,.08), transparent 55%),
        radial-gradient(380px 140px at 85% 10%, rgba(255,183,77,.1), transparent 55%);
      filter: blur(2px);
      z-index:0;
    }
    .card > *{ position:relative; z-index:1; }

    h1{ margin:0 0 8px; font-size: clamp(22px, 3.2vw, 34px); }
    p{ margin:0 0 18px; color: var(--muted); line-height:1.45; }

    .row{ display:flex; gap:12px; flex-wrap:wrap; margin-top: 10px; }
    input{
      flex:1 1 260px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(233,30,99,.2);
      outline: none;
      background: rgba(255,255,255,.7);
      color: var(--txt);
      font-size: 16px;
    }
    button{
      flex:0 0 auto;
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color:#1a1020;
      font-weight: 900;
      font-size: 16px;
      transition: transform .08s ease;
    }
    button:active{ transform: scale(.98); }

    .hidden{ display:none !important; }

    .reveal{
      margin-top: 18px;
      padding: 16px 16px;
      border-radius: 14px;
      border: 1px solid rgba(233,30,99,.1);
      background: rgba(255,255,255,.5);
      overflow:hidden;
      animation: revealIn 0.6s ease-out;
    }
    @keyframes revealIn{
      from{ opacity: 0; transform: translateY(20px) scale(0.97); }
      to{ opacity: 1; transform: translateY(0) scale(1); }
    }
    .reveal-with-photo{
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      position: relative;
    }
    .greeting-content{ flex: 1 1 280px; min-width: 0; }
    .greeting-content .music-wrap{
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(233,30,99,.12);
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }
    body.theme-dark .greeting-content .music-wrap{ border-top-color: rgba(255,255,255,.1); }
    .photo-block{
      flex: 0 0 auto;
      width: min(280px, 100%);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(233,30,99,.12);
      background: rgba(255,255,255,.4);
      position: relative;
      aspect-ratio: 3/4;
    }
    .greeting-photo{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .greeting-photo[src=""]{ display: none; }
    .photo-placeholder{
      position: absolute;
      inset: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    .photo-block.has-photo .photo-placeholder{ display: none; }
    .photo-block.has-photo .greeting-photo{ display: block; }
    .big{
      font-size: clamp(18px, 2.6vw, 26px);
      margin: 0 0 10px;
      font-weight: 950;
    }
    .text{
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-line;
      color: var(--txt);
    }

    .title-row{
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .title-row .centerHeart{
      margin: 0;
      flex-shrink: 0;
    }
    .centerHeart{
      width: 66px; height:66px;
      filter: drop-shadow(0 8px 18px rgba(255,77,125,.35));
      animation: pulse 1.2s ease-in-out infinite;
      display: block;
      margin: 6px 0 10px;
    }
    @keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

    .hint{
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .hint b{ color: var(--txt); }

    .theme-toggle{
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.25);
      backdrop-filter: blur(8px);
      color: var(--txt);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .08s;
    }
    .theme-toggle:hover{ background: rgba(255,255,255,.4); }
    .theme-toggle:active{ transform: scale(.97); }
    body.theme-dark .theme-toggle{
      background: rgba(0,0,0,.25);
      border-color: rgba(255,255,255,.15);
      color: #e9ecff;
    }
    body.theme-dark .theme-toggle:hover{ background: rgba(0,0,0,.4); }

    .music-toggle{
      padding: 8px 10px;
      min-width: 40px;
      min-height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(233,30,99,.15);
      background: rgba(255,255,255,.35);
      color: var(--txt);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .08s;
      opacity: 0.85;
    }
    .music-toggle:hover{ background: rgba(255,255,255,.5); opacity: 1; }
    .music-toggle:active{ transform: scale(.96); }
    body.theme-dark .music-toggle{
      background: rgba(255,255,255,.06);
      border-color: rgba(255,77,125,.2);
      color: #e9ecff;
      opacity: 0.8;
    }
    body.theme-dark .music-toggle:hover{ background: rgba(255,255,255,.1); opacity: 1; }

    /* Тёмная тема */
    body.theme-dark{
      --bg1:#0b1020;
      --bg2:#1b1f3a;
      --bg3:#1b1f3a;
      --card: rgba(17,22,42,.78);
      --txt:#e9ecff;
      --muted:#aab0d6;
      --a1:#ff4d7d;
      --a2:#ffb84d;
    }
    body.theme-dark{
      background:
        radial-gradient(1000px 600px at 20% 20%, #2a2f63 0%, transparent 60%),
        radial-gradient(900px 600px at 80% 30%, #6a2a5d 0%, transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    body.theme-dark .glow{
      background:
        radial-gradient(120px 120px at 12% 22%, rgba(255,77,125,.25), transparent 50%),
        radial-gradient(100px 100px at 28% 70%, rgba(255,184,77,.18), transparent 50%),
        radial-gradient(110px 110px at 80% 35%, rgba(255,255,255,.22), transparent 50%),
        radial-gradient(90px 90px at 66% 82%, rgba(255,77,125,.15), transparent 50%);
    }
    body.theme-dark .card{
      border-color: rgba(255,255,255,.1);
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    body.theme-dark .card:before{
      background:
        radial-gradient(520px 180px at 20% 0%, rgba(255,77,125,.35), transparent 60%),
        radial-gradient(560px 200px at 80% 20%, rgba(255,184,77,.26), transparent 60%);
    }
    body.theme-dark input{
      border-color: rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
    }
    body.theme-dark .reveal{
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
    }
    body.theme-dark .photo-block{
      border-color: rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
    }

    @media (max-width: 820px), (max-height: 820px) {
      body{
        place-items: start center;
        padding: 64px 0 18px;
      }
      .card{
        width: min(920px, calc(100vw - 16px));
      }
    }
  </style>
</head>
<body>
  <button type="button" class="theme-toggle" id="themeToggle" title="Сменить фон">Светлый фон</button>
  <div class="glow"></div>
  <canvas id="sparkles"></canvas>
  <canvas id="hearts"></canvas>
  <canvas id="confetti"></canvas>

  <main class="card">
    <h1>💐 Персональное поздравление к 8 марта</h1>
    <p>Введите вашу корпоративную почту — откроется персональное поздравление.</p>

    <div class="row" id="form">
      <input id="emailInput" type="email" placeholder="например: name@skillbox.ru" autocomplete="email" />
      <button id="openBtn">Открыть</button>
    </div>

    <section id="result" class="hidden">
      <div class="reveal reveal-with-photo">
        <div class="greeting-content">
          <div class="title-row">
            <svg class="centerHeart" viewBox="0 0 64 64" aria-hidden="true">
              <defs>
                <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#ff4d7d"/>
                  <stop offset="1" stop-color="#ffb84d"/>
                </linearGradient>
              </defs>
              <path fill="url(#grad)" d="M32 56s-18-10.6-24.3-22.2C2.7 23.2 8.3 14 18 14c5.3 0 9.2 2.9 11.4 6.2C31.6 16.9 35.5 14 40.8 14c9.7 0 15.3 9.2 10.3 19.8C50 45.4 32 56 32 56z"/>
            </svg>
            <div class="big" id="titleLine"></div>
          </div>
          <div class="text" id="textLine"></div>

          <div class="hint" id="hint">
            Если музыка не включилась сама — просто <b>кликни по странице</b> (ограничение браузера).
          </div>
          <div class="music-wrap">
            <button type="button" class="music-toggle" id="musicToggle" title="Выключить музыку" aria-label="Выключить музыку">
              <span id="musicToggleIcon">🔊</span>
            </button>
          </div>
        </div>
        <div class="photo-block">
          <img id="greetingPhoto" src="" alt="Поздравительное фото" class="greeting-photo" />
          <p class="photo-placeholder" id="photoPlaceholder">Фото сгенерировано нейросетью</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Музыка (опционально). Положи рядом music.mp3 -->
  <audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg" />
  </audio>

  <script>
    // ===== ТАБЛИЦА: почта → имя → персональный текст (обновлено из CSV) =====
    // Источник: ~/Downloads/Поздравление - 8 марта.csv (колонки: id, Почта, Имя, Текст поздравления)
    const COLLEAGUES_TABLE = [
      { email: "ekaterina.sinkova@skillbox.ru", name: "Екатерина", text: "В этот весенний день особенно хочется сказать тебе спасибо за ту команду и атмосферу, которую ты смогла создать вокруг себя.  Рядом с тобой чувствуешь уверенность и поддержку — знаешь, что всегда можно задать вопрос, обсудить любую ситуацию и получить внимательное отношение, помощь и мудрый совет. Благодаря тебе рядом есть пространство, где можно расти, развиваться и не бояться пробовать новое. ❤️  \\n\\nЖелаю тебе больше радости, вдохновения и внутреннего спокойствия. Пусть дома всегда будет тепло и уют, в семье — гармония и счастливые моменты.  \\nИ пусть рядом будет команда, которая будет радовать сильными идеями, результатами и показателями, которыми можно по-настоящему гордиться. ✨", photoUrl: "photos/1.png" },
      { email: "natalya.kozlova@skillbox.ru", name: "Наталья", text: "В этот весенний день хочется сказать тебе спасибо за ту энергию и настроение, которые ты приносишь в нашу работу.  \\n\\nТвой юмор, лёгкость и умение вовремя сказать нужную шутку часто делают рабочие будни намного теплее и светлее. Иногда достаточно одного твоего сообщения — и атмосфера сразу становится легче, а настроение у всех поднимается.  \\n\\nПусть впереди будет как можно больше радостных дней, вдохновения и поводов для улыбок. Пусть рядом всегда будут люди, с которыми легко, тепло и по-настоящему приятно идти по жизни. 🌷", photoUrl: "photos/2.png" },
      { email: "elena.shtumpf@skillbox.ru", name: "Елена", text: "В этот весенний день хочется сказать спасибо за твою помощь, поддержку и тот опыт, которым ты так щедро делишься.  \\n\\nТы всегда находишь время подсказать, направить и помочь разобраться даже в непростых ситуациях. Твоя открытость, внимательность и профессионализм создают ощущение надёжности — рядом с тобой работать спокойно и уверенно.  \\n\\nПусть этот день принесёт много тёплых слов, улыбок и хорошего настроения. Пусть весна подарит лёгкость, вдохновение и как можно больше светлых и радостных моментов. 🌷", photoUrl: "photos/3.png" },
      { email: "oksana.katsapova@skillbox.ru", name: "Оксана", text: "В этот весенний день хочется сказать тебе спасибо за твою отзывчивость, опыт и готовность всегда прийти на помощь. 🌷  \\n\\nК тебе можно обратиться с вопросом и ты всегда поможешь разобраться даже в непростых рабочих моментах. Твоя открытость, поддержка и лёгкость в общении создают очень тёплую атмосферу и делают многие задачи гораздо проще.  \\n\\nЖелаю тебе как можно больше радости, вдохновения и приятных событий. Пусть каждый день приносит хорошие новости, искренние улыбки и поводы для хорошего настроения.\\nПусть дома всегда будет уют, тепло и гармония, а рядом — близкие люди, с которыми легко, спокойно и по-настоящему счастливо. ✨", photoUrl: "photos/4.png" },
      { email: "elena.vovk@skillbox.ru", name: "Елена", text: "В этот весенний день хочется сказать спасибо за твою экспертизу, помощь и готовность разбираться даже в самых сложных вопросах. 🌷  \\n\\nТы всегда стараешься найти решение, подсказать и помочь прийти к компромиссу. Очень ценим твою поддержку и твои знания в работе с юнитами — которые впечатляют и часто помогают разобраться даже в непростых ситуациях. ✨  \\n\\nЖелаю тебе этой весной больше тепла, лёгкости и радостных моментов. Пусть дома будет уют и гармония, хлопот будет как можно меньше, а рядом всегда будут близкие люди и хорошее настроение.", photoUrl: "photos/5.png" },
      { email: "diana.rubtsova@skillbox.ru", name: "Диана", text: "В этот весенний день хочется сказать тебе спасибо за твою доброжелательность, юмор и открытость. 🌷  \\n\\nК тебе всегда можно прийти с вопросом, получить помощь и уйти не только с решением, но и с хорошим настроением.  \\n\\nСпасибо за твою отзывчивость, легкость в общении и то теплое отношение, которое ты создаёшь вокруг себя.   ❤️\\n\\nПусть эта весна принесет больше радостных дней, улыбок и вдохновения. Пусть дома будет уют, тепло и как можно больше счастливых моментов рядом с близкими.", photoUrl: "photos/6.png" },
      { email: "anastasiya.suprun@skillbox.ru", name: "Анастасия", text: "В этот прекрасный день хочу пожелать тебе исполнения самых заветных желаний, которых ты по-настоящему ждёшь. Удачи, успеха во всём и, конечно, большой и чистой любви — пусть рядом появится достойный и любящий человек, который будет ценить тебя. И отдельное спасибо тебе за помощь и взаимовыручку — это очень ценно! С праздником!", photoUrl: "photos/7.png" },
      { email: "aleksandra.zhitchenko@skillbox.ru", name: "Александра", text: "От всей души желаю тебе и твоей семье всего самого наилучшего. Пусть во всём сопутствуют успех и удача, а в жизни происходит как можно больше радостных и по-настоящему ценных для тебя событий.\\nС праздником!", photoUrl: "photos/8.png" },
      { email: "naira.aslanyan@skillbox.ru", name: "Наира", text: "От всей души благодарю тебя за профессионализм, поддержку и ценные советы — они действительно очень помогают. Спасибо за твою отзывчивость!\\nЖелаю тебе самого наилучшего, больших успехов, удачи и всего самого светлого. С праздником!", photoUrl: "photos/9.png" },
      { email: "tatyana.grineva@skillbox.ru", name: "Татьяна", text: "Желаю тебе всего, что ты сама для себя загадала, — пусть всё обязательно сбудется. Твой спокойный и добрый голос всегда внушает доверие и уют, спасибо тебе за это тепло. С праздником!", photoUrl: "photos/10.png" },
      { email: "alena.lyubakova@skillbox.ru", name: "Алена", text: "Ты — то самое тепло и свет, которое делает нашу команду особенной. Твоя улыбка в сообщениях, твоя способность всё успевать и при этом оставаться такой лёгкой и доброй — это настоящее волшебство 💖\\nПусть этот день будет полон нежности: красивых слов, искренних комплиментов, маленьких радостей и больших поводов для счастья. Желаем тебе вдохновения, которое искрится, сил, которых всегда хватает с запасом, и чтобы каждый день приносил тебе ощущение «всё именно так, как я мечтала» 🌷🌿\\nТы невероятная, и мы очень счастливы, что ты с нами.", photoUrl: "photos/11.png" },
      { email: "marina.nesterova@skillbox.ru", name: "Марина", text: "Ты — как воплощение весны и красоты в одном лице: грациозная, сияющая, с той самой магией, которая заставляет всех вокруг улыбаться. Твоя модельная харизма, лёгкость движений и умение быть настоящей в любой роли делают тебя по-настоящему особенной 💖\\nПусть этот день будет наполнен нежностью, искренними комплиментами, цветами (и настоящими, и теми, что расцветают в душе), моментами, когда ты чувствуешь себя самой желанной и вдохновляющей. Желаем тебе новых ярких кадров, лёгкости в каждом шаге по жизни, океана вдохновения и чтобы счастье всегда позировало именно тебе 🌷🌿\\nТы невероятная, уникальная и очень важная для нас.", photoUrl: "photos/12.png" },
      { email: "tatyana.tsarimoniya@skillbox.ru", name: "Татьяна", text: "Ты — наш неиссякаемый источник позитива и лёгкости! Столько лет вместе, а твоя душа всё такая же яркая, весёлая и молодая — от одного твоего сообщения в чате всем становится теплее, а день — чуточку праздничнее 💖\\nТы умеешь разрядить любую ситуацию шуткой, поднять настроение в самый напряжённый момент и напомнить, что работать можно и нужно с улыбкой. Спасибо за эту заразительную энергию, за твою открытость и за то, что ты всегда остаёшься такой настоящей и светлой 🌷\\nПусть этот день будет полон твоего любимого смеха, искренних комплиментов, маленьких радостей и больших поводов чувствовать себя невероятно счастливой. Желаем тебе бесконечного вдохновения, лёгкости в каждом дне, крепкого здоровья и чтобы вокруг тебя всегда было только хорошее настроение и добрые люди 🌿\\nТы — душа нашей команды и настоящее сокровище!", photoUrl: "photos/13.png" },
      { email: "svetlana.kultina@skillbox.ru", name: "Светлана", text: "Ты — наш ежедневный лучик света в чате. Каждое утро и вечер твои разные картинки — как маленькие подарки: то анимешка, то смешной мем — и от этого день сразу становится чуточку добрее и теплее 💖\\nПри этом ты невероятно трудолюбивая — всегда на посту, всё доделываешь до идеала, держишь марку и никогда не подводишь. А когда переживаешь из-за клиентов — это потому, что тебе правда не всё равно, и это так ценно в наше время.\\nПусть сегодня все переживания растворятся, как сахар в тёплом чае, а вместо них придёт море спокойствия, искренних комплиментов, красивых слов и тех самых картинок счастья — только уже для тебя самой 🌷🌿\\nЖелаем тебе лёгкости в душе, чтобы клиенты радовали, а не тревожили, новых вдохновляющих идей, крепкого здоровья и чтобы каждый день приносил повод улыбнуться так же искренне, как ты заставляешь улыбаться нас.", photoUrl: "photos/14.png" },
      { email: "anastasiya.kurusenko@skillbox.ru", name: "Анастасия", text: "Ты — настоящее украшение нашей команды: красивая не только внешне, но и в каждом своём действии, слове и решении. Всё, что ты делаешь — всегда по делу, чётко, ответственно и с такой потрясающей надёжностью, что на тебя можно положиться в любой момент 💖\\nТвоя прямая манера говорить, без лишних слов и воды, — это редкий и очень ценный дар. Ты умеешь сказать ровно то, что нужно, и именно так, чтобы всё сразу стало понятнее и проще. Спасибо за эту ясность, за твою красоту, которая вдохновляет, и за ответственность, которая держит нас всех на плаву 🌷\\nПусть этот день будет таким же идеальным, как ты: полным нежных слов, искренних комплиментов, цветов и моментов, когда ты чувствуешь себя по-настоящему любимой и счастливой. Желаем тебе лёгкости в душе, новых красивых побед, сил, которые всегда с запасом, и чтобы всё вокруг отвечало твоей же точности и гармонии 🌿\\nТы — наша гордость, наша красота и наша надёжность!", photoUrl: "photos/15.png" },
      { email: "anastasiya.tolkacheva@skillbox.ru", name: "Анастасия", text: "От Майкла Скотта\\nАнастасия!!! С лучшим днем в году! (Ладно, вторым после моего дня рождения). Твоя суперсила в том, что ты умудряешься делать вид, будто слушаешь меня на летучках. Если бы давали «Оскар» за то, чтобы не закатывать глаза, ты бы получила его 5 лет подряд.\\n\\nЖелаю меньше отчетов и больше тортов. И помни: ты — украшение офиса. Даже когда Джим снова прячет чью-то ручку в желе.\\nТвой любимый босс, Майкл\\n\\nОт Джима Халперта\\nАнастасия, с 8 Марта! Каждый день ты думаешь: «Как я еще не сошла с ума?». Этот офис спасают от хаоса люди вроде тебя — островки адекватности в море абсурда. Спасибо тебе за это.\\n\\nЖелаю поменьше «майклов» в жизни и побольше поводов для улыбки. И пусть твои планы на вечер стоят того, чтобы сбежать отсюда ровно в 18:00.\\nС наилучшими пожеланиями, Джим\\nP.S. Честное скаутское, сегодня ничьи вещи в студень макать не буду.\\n\\nОт Дуайта Шрута\\nАнастасия. Поздравляю. Хоть я и считаю этот праздник нелогичным, я признаю твой вклад в работу филиала. Ты пунктуальна, спокойна и держишь стол в порядке. В тебе есть задатки ши-воина.\\n\\nЖелаю тебе железной выдержки и острого ума. Прими свёклу — символ стойкости. Пусть красота будет естественной, а характер — крепким.\\nС уважением, Дуайт К. Шрут (и.о. зам. пом. рег. менеджера)", photoUrl: "photos/16.png" },
      { email: "oksana.volovikova@skillbox.ru", name: "Оксана", text: "Ты совершила невозможное — привезла кусочек южного солнца в самый северный город страны! Говорят, Питер не прощает тем, кто не умеет улыбаться, но ты справляешься лучше любого местного жителя. Твоё чувство юмора греет лучше любого обогревателя, а готовность прийти на помощь — это тот самый тёплый плед, который так нужен в промозглый день.\\n\\nЖелаем тебе, чтобы в душе всегда был Крым (солнечно и беззаботно), а в жизни — уютный Питер (красиво, культурно и с разводными мостами только по твоему желанию).\\n\\nС праздником!", photoUrl: "photos/17.png" },
      { email: "natalya.kravchenko@skillbox.ru", name: "Наталья", text: "Много мнений и эмоций вокруг данной даты и праздника, но от всей души хотелось бы поздравить тебя как женщину, маму, друга и просто хорошего человека и отличного собеседника! Пусть работа будет в сладость, не только этот день, а каждый наполнял только позитивными эмоциями и раскрывал новые горизонты!!!", photoUrl: "photos/18.png" },
      { email: "svetlana.a.kraynyukova@skillbox.ru", name: "Светлана", text: "Пусть этот день и каждый последующий день наполнит тебя новыми позитивными эмоциями, запах от твоих любимых цветов не уходил ровно до следющего 8 марта, а там как феникс заново возраждался. Легкой работы, меньше нервов и по-больше заботы от близких. Ты не просто человек, с которым легко работать и который выручит в трудную минуту диалога, ты человек, на которого можно положиться в любой ситуации!!!", photoUrl: "photos/19.png" },
      { email: "natalya.elizarova@skillbox.ru", name: "Наталья", text: "Пусть все твои мечты и желания сбывались! \\nЖелаем тебе продолжать карьерный рост и достигать новых целей! \\nЖелаем крепкого здоровья, чтобы дома всегда ждали близкие люди и чтобы всегда было на чье плечо опереться.\\nЦвети и расцветай вместе с этой весной!", photoUrl: "photos/20.png" },
      { email: "valeriya.ustyan@skillbox.ru", name: "Валерия", text: "Желаем, чтобы карьера шла только вверх, жизнь наполнялась лишь позитивом, чтобы всегда все получалось, а желаемое — сбывалось.\\nПусть в личной жизни будет счастье, благополучие, гармония и поддержка.\\nПьянящей весны, цветов и постоянного внимания!", photoUrl: "photos/21.png" },
      { email: "anastasiya.kazarova@skillbox.ru", name: "Анастасия", text: "Мы желаем тебе неисчерпаемого женского счастья, безграничной любви, беспрепятственного успеха, бесперебойной удачи и бесконечного желания удивлять этот мир!\\nЗдоровья тебе, спокойных трудовых будней и всегда позитивного отдыха.\\nЖелаем красоты и власти богинь, доброты и нежности чутких женщин!", photoUrl: "photos/22.png" },
      { email: "tatyana.nikitina@skillbox.ru", name: "Татьяна", text: "Пусть весна вдохновляет, работа приносит радость и карьерный рост, а жизнь — счастье, любовь и уют. \\nЖелаем оставаться такой же обаятельной, успешной и энергичной. \\nПусть чаще звучат комплименты, а в душе всегда царит гармония и тепло. \\nСияй и вдохновляй!", photoUrl: "photos/23.png" },
      { email: "kristina.voytenkova@skillbox.ru", name: "Кристина", text: "Желаем тебе всегда оставаться такой же яркой, уверенной и целеустремленной. \\nПусть каждый день приносит радость, а работа и отдых будут в идеальном балансе.\\nЖелаем тебе крепкого здоровья, неиссякаемой энергии, благополучия и личного счастья.\\nПусть будет много комплиментов, ароматных цветов и улыбок в этот день!", photoUrl: "photos/24.png" },
      { email: "darya.starostina@skillbox.ru", name: "Дарья", text: "Мы желаем тебе успеха трудового, благосостояния материального, душевного покоя и жизненного равновесия!\\nПусть весна принесет новые возможности, яркие идеи и успешное осуществление всех твоих планов.\\nСамое главное крепкого здоровья и женского счастья!\\nПусть этот день наполнит твою жизнь радостью, приятными сюрпризами и цветами!", photoUrl: "photos/25.png" },
      { email: "nadezhda.demyanova@skillbox.ru", name: "Надежда", text: "Желаем тебе цвести от счастья, порхать от любви и вдохновляться! 🌷💐  \\n\\nПусть в жизни будет как можно больше радостных моментов, приятных встреч и поводов для улыбок. Пусть каждый день приносит что-то хорошее — маленькие радости, тёплые слова и новые возможности. ✨  \\n\\nСпасибо тебе за легкость в общении и ту атмосферу тепла и доброжелательности, которую ты создаешь вокруг себя. С тобой всегда легко поговорить, пошутить и просто приятно работать.  \\n\\nПусть рядом всегда будут близкие люди, дом будет наполнен уютом и смехом, а впереди будет много счастливых событий, вдохновения и исполнения самых заветных желаний. 💛", photoUrl: "photos/26.png" },
      { email: "kseniya.slipenko@skillbox.ru", name: "Ксения", text: "Желаем, чтобы у тебя всегда было время для любимых дел, любимых людей и, конечно же, для себя. 💛\\n\\nПусть твое сердце всегда будет полным любви и радости, а твой дом — уютным и тёплым. 🏡\\nПусть сын радует своими успехами и дарит как можно больше поводов для гордости. 🌟\\n\\nЖелаем тебе цвести от счастья, порхать от любви и вдохновляться новыми идеями, мечтами и яркими моментами! 🌷💐✨", photoUrl: "photos/27.png" },
      { email: "viktoriya.mastyugina@skillbox.ru", name: "Виктория", text: "Желаю весеннего настроения, неизменного профессионального успеха и стабильного благополучия во всех начинаниях. Пусть каждый день приносит только вдохновение и позитивные новости, а поставленные задачи решаются легко и продуктивно. Желаю, чтобы эта весна открыла новые возможности для карьерного и личностного роста. Пусть в жизни всегда находится баланс между достижением важных целей и временем для приятного отдыха! 🌷✨", photoUrl: "photos/28.png" },
      { email: "liliya.momot@skillbox.ru", name: "Лилия", text: "Желаю, чтобы этот сезон наполнил новой энергией для реализации самых смелых профессиональных планов и амбиций. Пусть рабочие будни всегда будут продуктивными, а достигнутые результаты приносят искреннее удовлетворение. Желаю процветания, надежных партнеров рядом и неизменной удачи во всех начинаниях. Пусть весна подарит как можно больше поводов для улыбок и отличного настроения! 🌿📈", photoUrl: "photos/29.png" },
      { email: "alena.gudz@skillbox.ru", name: "Алена", text: "Пусть эта весна принесет в жизнь легкость, добрые события и вдохновение для исполнения всех желаний. Желаю, чтобы любые личные задумки и планы реализовывались именно так, как задумала, а на пути встречались только понимание и поддержка. Пусть каждый день радует хорошим настроением, душевным спокойствием и уютом в кругу близких людей. Желаю прекрасных праздничных выходных, наполненных теплом и искренними улыбками! ✨☀️", photoUrl: "photos/30.png" },
      { email: "elena.zubenina@skillbox.ru", name: "Елена", text: "Желаю как можно больше солнечных дней, весеннего тепла и простого человеческого счастья. Пусть эта весна принесет много поводов для искренних улыбок, а каждый день будет наполнен спокойствием и душевным комфортом. Желаю, чтобы всегда окружали доброта, внимание и поддержка близких людей. Пусть праздничное настроение сохранится надолго, а в доме всегда царят уют и гармония! 🌸☕️✨", photoUrl: "photos/31.png" },
      { email: "galina.sidskaya@skillbox.ru", name: "Галина", text: "Желаем тебе солнечного настроения, море цветов, комплиментов и приятных сюрпризов. \\nПусть рядом всегда будут любящие люди, а в доме царят мир, уют и гармония. \\nКонечно же, желаем тебе новых профессиональных успехов и достижения всех поставленных целей!\\nПусть этот праздник станет еще одним поводом для улыбок, приятных моментов и искренних комплиментов.🌷💐✨", photoUrl: "photos/32.png" }
    ];

    const SIGNATURE = "С огромной благодарностью, восхищением и самыми тёплыми чувствами, твои коллеги ❤️";
    // Общее фото (портрет с цветами в стиле открытки) — файл 0 в папке проекта
    const DEFAULT_GREETING_PHOTO = "photos/0.png";

    const $ = (id) => document.getElementById(id);
    const emailInput = $("emailInput");
    const openBtn   = $("openBtn");
    const result    = $("result");
    const titleLine = $("titleLine");
    const textLine  = $("textLine");
    const hint      = $("hint");
    const music     = $("music");
    const greetingPhoto = $("greetingPhoto");
    const photoBlock = document.querySelector(".photo-block");

    function normalizeEmail(email) {
      return (email || "").trim().toLowerCase().replace(/\s+/g, "");
    }
    function findColleague(email){
      const normalized = normalizeEmail(email);
      if (!normalized) return null;
      return COLLEAGUES_TABLE.find(r => r.email.toLowerCase().replace(/\s+/g, "") === normalized);
    }

    function showGreeting(email){
      const colleague = findColleague(email);
      const name = colleague ? colleague.name : "коллега";
      const rawText = colleague && colleague.text
        ? colleague.text
        : "Поздравляем с 8 марта 🌸\nПусть будет больше радости, лёгкости и приятных сюрпризов — и дома, и на работе.";
      // Нормализуем переносы строк: удаляем \r и превращаем литеральные \"\\n\" в реальные переводы строк
      const customText = (rawText || "")
        .replace(/\r/g, "")
        .replace(/\\n/g, "\n");
      const fullMessage = `${customText}\n\n${SIGNATURE}`;

      // #region agent log
      fetch('http://127.0.0.1:7577/ingest/e74120f8-e659-4846-8f0f-261fae909319',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'bbf885'},body:JSON.stringify({sessionId:'bbf885',runId:'pre-fix',hypothesisId:'H2',location:'index.html:showGreeting',message:'greeting text raw',data:{emailNorm:normalizeEmail(email),name,customTextHasLiteralBackslashN:customText.includes('\\\\n'),customTextNewlineCount:(customText.match(/\n/g)||[]).length,customTextSample:customText.slice(0,160),fullMessageHasLiteralBackslashN:fullMessage.includes('\\\\n'),fullMessageNewlineCount:(fullMessage.match(/\n/g)||[]).length},timestamp:Date.now()})}).catch(()=>{});
      // #endregion

      titleLine.textContent = `Дорогая ${name}, с 8 марта! ✨`;
      textLine.textContent  = fullMessage;

      if (greetingPhoto && photoBlock) {
        const photoUrl = (colleague && colleague.photoUrl) ? colleague.photoUrl : DEFAULT_GREETING_PHOTO;
        if (photoUrl) {
          greetingPhoto.src = photoUrl;
          greetingPhoto.alt = `Поздравление для ${name}`;
          photoBlock.classList.add("has-photo");
          greetingPhoto.onerror = () => { photoBlock.classList.remove("has-photo"); };
        } else {
          greetingPhoto.removeAttribute("src");
          photoBlock.classList.remove("has-photo");
        }
      }

      result.classList.remove("hidden");
      result.scrollIntoView({behavior:"smooth", block:"start"});

      if(!running){
        running = true;
        startConfettiBurst();
        requestAnimationFrame(tickSparks);
        requestAnimationFrame(tickHearts);
      }

      tryPlayMusic();

      const url = new URL(location.href);
      url.searchParams.set("email", (email || "").trim());
      history.replaceState({}, "", url.toString());
    }

    openBtn.addEventListener("click", () => {
      const raw = emailInput.value.trim();
      if (!raw) return;
      const colleague = findColleague(raw);
      // #region agent log
      fetch('http://127.0.0.1:7577/ingest/e74120f8-e659-4846-8f0f-261fae909319',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'bbf885'},body:JSON.stringify({sessionId:'bbf885',runId:'pre-fix',hypothesisId:'H3',location:'index.html:openBtn',message:'open attempt',data:{raw,normalized:normalizeEmail(raw),found:!!colleague},timestamp:Date.now()})}).catch(()=>{});
      // #endregion
      if (!colleague) {
        alert("Почта не найдена в списке. Поздравление доступно только для зарегистрированных адресов.");
        return; // общее поздравление не показываем
      }
      showGreeting(raw);
    });
    emailInput.addEventListener("keydown", (e) => { if(e.key === "Enter") openBtn.click(); });

    // ===== ПЕРЕКЛЮЧЕНИЕ ТЕМЫ (светлый / тёмный фон) =====
    // Всегда начинаем со светлой темы; выбор не запоминаем между перезагрузками.
    window.themeDark = false;
    const themeToggle = $("themeToggle");
    function applyTheme(){
      // #region agent log
      fetch('http://127.0.0.1:7577/ingest/e74120f8-e659-4846-8f0f-261fae909319',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'bbf885'},body:JSON.stringify({sessionId:'bbf885',runId:'pre-fix',hypothesisId:'H1',location:'index.html:applyTheme',message:'theme apply',data:{themeDark:window.themeDark},timestamp:Date.now()})}).catch(()=>{});
      // #endregion
      document.body.classList.toggle("theme-dark", window.themeDark);
      if (themeToggle) {
        themeToggle.textContent = window.themeDark ? "Тёмный фон" : "Светлый фон";
      }
    }
    applyTheme();
    themeToggle.addEventListener("click", () => {
      window.themeDark = !window.themeDark;
      applyTheme();
    });

    // ===== КНОПКА МУЗЫКИ В ПОЗДРАВЛЕНИИ (глушить / воспроизвести) =====
    const musicToggle = $("musicToggle");
    const musicToggleIcon = $("musicToggleIcon");
    let musicOn = true; // желаемое состояние: true = играть, false = выключено
    function updateMusicButton(){
      if (!musicToggle || !music) return;
      musicToggleIcon.textContent = musicOn ? "🔊" : "🔇";
      musicToggle.title = musicOn ? "Выключить музыку" : "Включить музыку";
      musicToggle.setAttribute("aria-label", musicToggle.title);
    }
    if (musicToggle && music) {
      musicToggle.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        e.preventDefault();
        musicOn = !musicOn;
        if (musicOn) {
          music.play().then(() => { hint.style.display = "none"; }).catch(() => { musicOn = false; updateMusicButton(); });
        } else {
          music.pause();
        }
        updateMusicButton();
      });
      music.addEventListener("play", () => { musicOn = true; updateMusicButton(); });
      music.addEventListener("pause", () => { musicOn = false; updateMusicButton(); });
      updateMusicButton();
    }

    // ===== CANVAS SETUP =====
    const sparkC = $("sparkles");
    const heartsC= $("hearts");
    const confC  = $("confetti");
    const sctx = sparkC.getContext("2d");
    const hctx = heartsC.getContext("2d");
    const cctx = confC.getContext("2d");

    let W, H;
    function resize(){
      W = sparkC.width = heartsC.width = confC.width = window.innerWidth;
      H = sparkC.height= heartsC.height= confC.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    const rand = (a,b)=>Math.random()*(b-a)+a;

    // ===== SPARKLES (мерцающие звёзды) =====
    let sparks = [];
    const SPARK_COUNT = 140;
    const sparkHues = [0, 30, 330, 280]; // розовый, золотой, маджента
    for(let i=0;i<SPARK_COUNT;i++){
      sparks.push({
        x: rand(0,W), y: rand(0,H),
        r: rand(1, 3),
        a: rand(0.1, 0.35),
        vx: rand(-0.2, 0.2),
        vy: rand(-0.15, 0.15),
        hue: sparkHues[Math.floor(rand(0, sparkHues.length))],
        phase: rand(0, Math.PI*2),
        twinkle: rand(2, 5)
      });
    }

    function drawSparkle(x, y, r, a, hue){
      const ray = r * 1.8;
      sctx.save();
      sctx.translate(x, y);
      sctx.strokeStyle = `hsla(${hue},95%,80%,${a})`;
      sctx.lineWidth = 1.2;
      sctx.lineCap = "round";
      for(let i=0;i<4;i++){
        sctx.rotate(Math.PI/2);
        sctx.beginPath();
        sctx.moveTo(-ray*0.15, 0);
        sctx.lineTo(ray, 0);
        sctx.stroke();
      }
      sctx.beginPath();
      sctx.arc(0,0,r*0.5,0,Math.PI*2);
      sctx.fillStyle = `hsla(${hue},90%,95%,${a})`;
      sctx.fill();
      sctx.restore();
    }

    function tickSparks(){
      sctx.fillStyle = window.themeDark ? "rgba(0,0,0,0.06)" : "rgba(255,245,250,0.12)";
      sctx.fillRect(0,0,W,H);

      const t = Date.now() / 1000;
      for(const p of sparks){
        p.x += p.vx; p.y += p.vy;
        if(p.x<0) p.x=W; if(p.x>W) p.x=0;
        if(p.y<0) p.y=H; if(p.y>H) p.y=0;
        p.phase += 0.02;
        const twinkle = 0.5 + 0.5 * Math.sin(t * p.twinkle + p.phase);
        const a = p.a * (0.4 + 0.6 * twinkle);
        drawSparkle(p.x, p.y, p.r, a, p.hue);
      }
      if(running) requestAnimationFrame(tickSparks);
    }

    // ===== HEARTS (летящие сердечки с пульсом и лёгким свечением) =====
    let hearts = [];
    const HEART_COUNT = 95;
    function makeHeart(randomY){
      return {
        x: rand(0,W),
        y: randomY ? rand(-H, H) : rand(-80, -10),
        vy: rand(1.2, 3),
        vx: rand(-0.5, 0.5),
        sway: rand(1, 2.8),
        phase: rand(0, Math.PI*2),
        size: rand(12, 26),
        rot: rand(-0.6, 0.6),
        vr: rand(-0.018, 0.018),
        alpha: rand(0.35, 0.9),
        pulsePhase: rand(0, Math.PI*2)
      };
    }
    for(let i=0;i<HEART_COUNT;i++) hearts.push(makeHeart(true));

    function drawHeart(x,y,s,rot,alpha, pulse){
      hctx.save();
      hctx.translate(x,y);
      hctx.rotate(rot);
      hctx.globalAlpha = alpha;
      const scale = 0.92 + 0.08 * pulse;
      hctx.scale(scale, scale);

      // лёгкое свечение
      hctx.shadowColor = "rgba(255,77,125,0.6)";
      hctx.shadowBlur = 12;
      hctx.beginPath();
      const k = s/18;
      hctx.moveTo(0, 6*k);
      hctx.bezierCurveTo(0, -3*k, -9*k, -3*k, -9*k, 4*k);
      hctx.bezierCurveTo(-9*k, 10*k, -3*k, 14*k, 0, 17*k);
      hctx.bezierCurveTo(3*k, 14*k, 9*k, 10*k, 9*k, 4*k);
      hctx.bezierCurveTo(9*k, -3*k, 0, -3*k, 0, 6*k);
      hctx.closePath();
      const g = hctx.createLinearGradient(-s/2, -s/2, s/2, s/2);
      g.addColorStop(0, "rgba(255,77,125,1)");
      g.addColorStop(0.5, "rgba(255,120,150,1)");
      g.addColorStop(1, "rgba(255,184,77,1)");
      hctx.fillStyle = g;
      hctx.fill();
      hctx.shadowBlur = 0;

      hctx.globalAlpha = alpha*0.4;
      hctx.fillStyle = "rgba(255,255,255,1)";
      hctx.beginPath();
      hctx.ellipse(-s*0.12, -s*0.05, s*0.10, s*0.18, 0, 0, Math.PI*2);
      hctx.fill();

      hctx.restore();
    }

    function tickHearts(){
      hctx.clearRect(0,0,W,H);
      for(const h of hearts){
        h.phase += 0.025*h.sway;
        h.x += h.vx + Math.sin(h.phase)*1.4;
        h.y += h.vy;
        h.rot += h.vr;
        h.pulsePhase += 0.08;
        const pulse = Math.sin(h.pulsePhase) * 0.5 + 0.5;
        drawHeart(h.x,h.y,h.size,h.rot,h.alpha, pulse);

        if(h.y > H + 70) Object.assign(h, makeHeart(false));
        if(h.x < -80) h.x = W+80;
        if(h.x > W+80) h.x = -80;
      }
      if(running) requestAnimationFrame(tickHearts);
    }

    // ===== CONFETTI (взрыв при открытии: полоски + квадраты, дольше и ярче) =====
    let confetti = [];
    const confettiHues = [0, 30, 330, 280, 45];
    function startConfettiBurst(){
      confetti = [];
      const count = 420;
      const cx = W/2;
      const topY = H*0.2;
      for(let i=0;i<count;i++){
        const angle = rand(-Math.PI*0.4, Math.PI*0.4) + (i % 2 ? 0 : Math.PI);
        const speed = rand(4, 11);
        confetti.push({
          x: rand(cx - W*0.4, cx + W*0.4),
          y: rand(topY - 30, topY + 80),
          vx: Math.cos(angle) * speed * rand(0.6, 1.2) + rand(-2, 2),
          vy: Math.sin(angle) * speed * rand(0.5, 1) - rand(1, 4),
          g: rand(0.04, 0.09),
          w: rand(4, 10),
          h: rand(2, 5),
          strip: Math.random() > 0.4,
          rot: rand(0, Math.PI*2),
          vr: rand(-0.2, 0.2),
          hue: confettiHues[Math.floor(rand(0, confettiHues.length))],
          sat: rand(85, 100),
          life: Math.floor(rand(120, 200)),
          maxLife: 200
        });
      }
      confTick();
    }

    function confTick(){
      cctx.clearRect(0,0,W,H);
      confetti = confetti.filter(p=>p.life>0);
      for(const p of confetti){
        p.x += p.vx; p.y += p.vy;
        p.vy += p.g*60;
        p.vx *= 0.998;
        p.rot += p.vr;
        p.life--;
        const norm = p.life / p.maxLife;
        const alpha = Math.min(1, norm * 1.2) * (1 - (1-norm)*(1-norm));

        cctx.save();
        cctx.translate(p.x, p.y);
        cctx.rotate(p.rot);
        const w = p.strip ? Math.max(p.w, p.h*2) : p.w;
        const h = p.strip ? Math.min(p.w, p.h) : p.h;
        cctx.fillStyle = `hsla(${p.hue},${p.sat}%,65%,${alpha})`;
        cctx.fillRect(-w/2, -h/2, w, h);
        cctx.restore();
      }
      if(confetti.length) requestAnimationFrame(confTick);
      else cctx.clearRect(0,0,W,H);
    }

    // ===== MUSIC =====
    async function tryPlayMusic(){
      if(!music) return;
      try{
        await music.play();
        hint.style.display = "none";
      }catch{
        hint.style.display = "";
      }
    }

    // Включить музыку по клику можно только после открытия поздравления (ограничение браузера)
    window.addEventListener("pointerdown", (e) => {
      if (e.target.closest("#musicToggle")) return;
      if(music && music.paused && !result.classList.contains("hidden")){
        music.play().then(()=> hint.style.display="none").catch(()=>{});
      }
    });

    // ===== START FROM QUERY (?email=...) =====
    (function init(){
      const url = new URL(location.href);
      const email = url.searchParams.get("email");
      if (email && findColleague(email)) {
        emailInput.value = email.trim();
        showGreeting(email);
      }
    })();

    // ===== RUN FLAG =====
    let running = false;
  </script>
</body>
</html>
